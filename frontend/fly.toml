# Fly.io configuration for the LIP2 frontend (React + nginx).
# Deploy with: fly deploy --config fly.toml
# from inside the /frontend directory.

app = "lip2-app"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[env]
  RESOLVER = "[fdaa::3]"
  BACKEND_URL = "http://lip2-api.internal:8000"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
