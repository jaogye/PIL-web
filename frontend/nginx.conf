server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Serve static assets with long-lived cache.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy /api/* to the backend service.
    # RESOLVER and BACKEND_URL are injected at container startup via envsubst.
    # Local (docker-compose): RESOLVER=127.0.0.11, BACKEND_URL=http://api:8000
    # Fly.io production:      RESOLVER=[fdaa::3],  BACKEND_URL=http://lip2-api.internal:8000
    location /api/ {
        resolver           ${RESOLVER} valid=10s;
        set $backend       ${BACKEND_URL};
        proxy_pass             $backend;
        proxy_http_version     1.1;
        proxy_read_timeout     600s;
        proxy_connect_timeout  10s;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback: all non-file routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers.
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin" always;
}
