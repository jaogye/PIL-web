services:

  # ── PostgreSQL + PostGIS ──────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: lip2
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lip2}
      POSTGRES_DB: lip2_ecuador
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lip2 -d lip2_ecuador"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://lip2:lip2@db:5432/lip2_ecuador}
      ADMIN_DATABASE: ${ADMIN_DATABASE:-admin}
      AVAILABLE_DATABASES: ${AVAILABLE_DATABASES:-'["lip2_ecuador","lip2_belgium"]'}
      DEBUG: ${DEBUG:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-'["http://localhost:5173","http://localhost:3000"]'}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000

  # ── React Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      RESOLVER: "127.0.0.11"
      BACKEND_URL: "http://api:8000"
    depends_on:
      - api

volumes:
  postgres_data:
